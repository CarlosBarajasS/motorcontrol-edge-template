# MediaMTX config
# Referencia: https://mediamtx.org/docs/references/configuration-file

logLevel: warn

# API Configuration
api: yes
apiAddress: 0.0.0.0:9997

# Authentication - Usuario simple para API interna
authInternalUsers:
  - user: edge
    pass: edge123
    permissions:
      - action: api
      - action: read

# Authentication methods para RTSP (streams)
rtspAuthMethods: [basic]

rtspAddress: :8554
hlsAddress: :8888
webrtcAddress: :8889

# La Pi actúa solo como puente de relay. Las grabaciones son responsabilidad del NVR local.
# El NAS/nube recibe los videos desde el servidor central, no desde la Pi.
pathDefaults:
  record: no
  # Relay al servidor central cuando el stream esté activo.
  # El edge empuja RTSP al central-mediamtx → sin necesidad de abrir puertos en el cliente.
  # Si CENTRAL_RTSP_HOST no está definido, ffmpeg fallará silenciosamente (runOnReadyRestart lo reintenta).
  runOnReady: >-
    ffmpeg -re
    -i rtsp://${MEDIAMTX_USERNAME}:${MEDIAMTX_PASSWORD}@127.0.0.1:8554/$MTX_PATH
    -c copy -f rtsp
    rtsp://${MEDIAMTX_PUSH_USER}:${MEDIAMTX_PUSH_PASS}@${CENTRAL_RTSP_HOST}:${CENTRAL_RTSP_PORT}/${GATEWAY_CLIENT_ID}/$MTX_PATH
  runOnReadyRestart: yes

paths:
  # Camara IP principal
  # Main stream (alta calidad: 1920x1080P @ 30fps H.264)
  cam-principal:
    source: rtsp://%env:CAMERA_USER%:%env:CAMERA_PASS%@%env:CAMERA_IP%:554/Streaming/Channels/101

  # Sub stream (baja calidad, ideal para celulares o conexiones lentas)
  cam-principal-low:
    source: rtsp://%env:CAMERA_USER%:%env:CAMERA_PASS%@%env:CAMERA_IP%:554/Streaming/Channels/102

  # Ruta comodín para agregar más cámaras dinámicamente en el futuro
  all_others:
