# MediaMTX config — edge gateway template
# ⚠️  ESTE ARCHIVO ES GENERADO POR EL WIZARD DE INSTALACIÓN.
# Después de colocar el archivo generado, ejecuta:
#   git update-index --assume-unchanged mediamtx/mediamtx.yml
# para protegerlo de futuros git pull.
#
# Si instalas manualmente, reemplaza CHANGE_ME_PASSWORD con una contraseña segura
# y asegúrate de que MEDIAMTX_PASSWORD en .env tenga el mismo valor.

logLevel: warn

# API Configuration
api: yes
apiAddress: 0.0.0.0:9997

authInternalUsers:
  - user: edge
    # ⚠️  REEMPLAZAR con la contraseña real (mínimo 16 caracteres)
    # Este valor DEBE coincidir con MEDIAMTX_PASSWORD en .env
    pass: CHANGE_ME_PASSWORD
    permissions:
      - action: api
      - action: read
      - action: publish
      - action: playback

rtspAuthMethods: [basic]
rtspAddress: :8554
hlsAddress: :8888
webrtcAddress: :8889

pathDefaults:
  record: no
  recordPath: /recordings/%path/%Y-%m-%d/%H-%M-%S
  recordFormat: fmp4
  recordSegmentDuration: 15m
  sourceOnDemand: false
  sourceProtocol: tcp
  # Relay al servidor central via RTSP push.
  # ${VAR} son variables de entorno del contenedor (docker-compose las inyecta).
  runOnReady: >-
    ffmpeg
    -rtsp_transport tcp
    -i rtsp://${MEDIAMTX_USERNAME}:${MEDIAMTX_PASSWORD}@127.0.0.1:8554/$MTX_PATH
    -c copy -f rtsp -rtsp_transport tcp
    rtsp://${MEDIAMTX_PUSH_USER}:${MEDIAMTX_PUSH_PASS}@${CENTRAL_RTSP_HOST}:${CENTRAL_RTSP_PORT}/${GATEWAY_CLIENT_ID}/$MTX_PATH
  runOnReadyRestart: yes

paths:
  # Los paths de cámaras se registran dinámicamente por edge-agent
  # via POST /v3/config/paths/add/{name} tras el discovery del DVR.
  # No definir paths estáticos aquí — causan crash si las variables no están definidas.
  all_others: ~
